###############################################################################
# MiLight bridge on Shelly 1 Gen4  (ESP32-C6 / ESP-IDF)
#
# The Shelly 1 Gen4 uses an ESP32-C6 chip (ESP-Shelly-C68F) and requires
# the ESP-IDF framework.  An NRF24L01+ module must be wired externally to
# available GPIOs.
#
# ─── Wiring (adjust pins to your setup) ──────────────────────────────────
#   NRF24L01+  →  Shelly 1 Gen4
#   VCC (3.3V) →  3V3
#   GND        →  GND
#   CE         →  GPIO18   (directly on the ce_pin setting)
#   CSN        →  GPIO20   (directly on the csn_pin setting)
#   SCK        →  GPIO21   (via spi_sclk_pin setting)
#   MOSI       →  GPIO22   (via spi_mosi_pin setting)
#   MISO       →  GPIO23   (via spi_miso_pin setting)
#   IRQ        →  not connected (unused)
#
# ⚠  The GPIO numbers above are EXAMPLES.  Verify which pads are
#    accessible on YOUR Shelly 1 Gen4 PCB before soldering.
###############################################################################

substitutions:
  device_name: shelly1g4-milight
  friendly_name: Shelly 1 Gen4 MiLight

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

  areas:
  - id: living_room
    name: "Living room"

  devices:
  - id: milight_bridge
    name: "MiLight Bridge"
    area_id: living_room

external_components:
- source:
    type: git
    url: https://github.com/hencou/esphome_components
    ref: main
  components: mi
  refresh: 0s

esp32:
  board: esp32-c6-devkitm-1
  variant: esp32c6
  flash_size: 8MB
  framework:
    type: esp-idf
    version: recommended

logger:
  level: DEBUG
  hardware_uart: USB_SERIAL_JTAG

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  fast_connect: true
  ap:
    ssid: "${friendly_name} Hotspot"
    password: !secret hotspot_password

mi:
  id: mi1
  ce_pin: 18                    # NRF24L01 CE  – adjust to your wiring
  csn_pin: 20                   # NRF24L01 CSN – adjust to your wiring
  spi_mosi_pin: 22              # NRF24L01 MOSI – adjust to your wiring
  spi_miso_pin: 23              # NRF24L01 MISO – adjust to your wiring
  spi_sclk_pin: 21              # NRF24L01 SCK  – adjust to your wiring
  packet_repeats: 50
  listen_repeats: 20
  state_flush_interval: 5000
  rf24_power_level: MAX
  rf24_listen_channel: LOW
  rf24_channels:
    - LOW
    - MID
    - HIGH
  on_command_received:
    - homeassistant.event:
        event: esphome.mi_command_received
        data:
          device_id: !lambda "return format_hex(data.device_id);"
          group_id: !lambda "return data.group_id;"
          remote_type: !lambda "return data.remote_type.c_str();"
          command: !lambda "return data.command.c_str();"

light:
  - platform: mi
    id: light1
    name: ${friendly_name}
    device_id: milight_bridge
    mi_device_id: 0xAB01         # your MiLight device id
    group_id: 1
    remote_type: rgb_cct
    default_transition_length: 0s

# Keep the Shelly relay functional alongside the MiLight bridge
switch:
  - platform: gpio
    name: "Relay"
    id: relay_1
    pin: GPIO5
    restore_mode: RESTORE_DEFAULT_OFF

sensor:
  - platform: internal_temperature
    name: "Internal Temperature"

binary_sensor:
  - platform: gpio
    name: "Switch Input"
    pin:
      number: 10
    filters:
      - delayed_on_off: 50ms
    on_press:
      then:
        - switch.toggle: relay_1

button:
  - platform: mi
    id: pair
    name: ${friendly_name} pair
    device_id: milight_bridge
    mi_device_id: 0xAB01
    group_id: 1
    remote_type: rgb_cct
    command: pair
    entity_category: config
  - platform: mi
    id: unpair
    name: ${friendly_name} unpair
    device_id: milight_bridge
    mi_device_id: 0xAB01
    group_id: 1
    remote_type: rgb_cct
    command: unpair
    entity_category: config
