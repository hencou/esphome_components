# --- Generic SDO write execute button ---
- platform: template
  name: "SDO Write Execute"
  id: ${device_name}_sdo_write_execute
  icon: "mdi:send"
  entity_category: config
  on_press:
    - lambda: |-
        if (!id(sdo_authenticated)) {
          ESP_LOGW("remeha", "Cannot write: not authenticated");
          id(${device_name}_write_status).publish_state("Not authenticated");
          return;
        }
        if (id(sdo_write_pending)) {
          ESP_LOGW("remeha", "Write busy, try again later");
          id(${device_name}_write_status).publish_state("Busy");
          return;
        }
        uint16_t idx = (uint16_t)id(${device_name}_sdo_write_index).state;
        uint8_t sub = (uint8_t)id(${device_name}_sdo_write_subindex).state;
        uint32_t val = (uint32_t)id(${device_name}_sdo_write_value).state;
        std::string size_str = id(${device_name}_sdo_write_size).current_option();
        uint8_t cmd;
        if (size_str == "1 byte") cmd = 0x2F;
        else if (size_str == "2 bytes") cmd = 0x2B;
        else cmd = 0x23;
        uint8_t data[8] = {cmd, (uint8_t)(idx & 0xFF), (uint8_t)(idx >> 8), sub,
          (uint8_t)(val & 0xFF), (uint8_t)((val >> 8) & 0xFF),
          (uint8_t)((val >> 16) & 0xFF), (uint8_t)((val >> 24) & 0xFF)};
        id(can1).send_data(0x241, false, false, std::vector<uint8_t>(data, data + 8));
        id(sdo_write_pending) = true;
        id(sdo_write_start_ms) = millis();
        id(${device_name}_write_status).publish_state("Sending...");
        ESP_LOGI("remeha", "WRITE SDO 0x%04X sub %d = %u (cmd=0x%02X)", idx, sub, val, cmd);

canbus:
- platform: esp32_can
  id: can1
  tx_pin: GPIO5
  rx_pin: GPIO35
  can_id: 0x100
  bit_rate: 1000kbps
  mode: NORMAL
  on_frame:

  # --- Standard SDO response (0x581): gateway ready detection ---
  - can_id: 0x581
    then:
    - lambda: |-
        if (x.size() < 4) return;
        uint8_t cmd = x[0];
        uint16_t index = ((uint16_t)x[2] << 8) | x[1];
        uint8_t sub = x[3];

        if (index == 0x4004 && sub == 0x00) {
          if ((cmd == 0x4F || cmd == 0x4B || cmd == 0x43) && x[4] > 0) {
            if (!id(sdo_node1_enabled)) {
              ESP_LOGI("remeha", "0x4004=0x%02X: custom SDO gateway READY", x[4]);
              id(sdo_node1_enabled) = true;
              // Immediately start auth
              if (!id(sdo_authenticated) && id(auth_step) == 0) {
                uint8_t rd[8] = {0x40, 0x01, 0x20, 0x0A, 0x00, 0x00, 0x00, 0x00};
                id(can1).send_data(0x241, false, false, std::vector<uint8_t>(rd, rd + 8));
                id(auth_step) = 1;
                id(auth_start_ms) = millis();
              }
            }
          } else if (cmd == 0x60) {
            if (!id(sdo_node1_enabled)) {
              ESP_LOGI("remeha", "Write to 0x4004 confirmed, gateway enabled");
              id(sdo_node1_enabled) = true;
              if (!id(sdo_authenticated) && id(auth_step) == 0) {
                uint8_t rd[8] = {0x40, 0x01, 0x20, 0x0A, 0x00, 0x00, 0x00, 0x00};
                id(can1).send_data(0x241, false, false, std::vector<uint8_t>(rd, rd + 8));
                id(auth_step) = 1;
                id(auth_start_ms) = millis();
              }
            }
          } else if (cmd == 0x80) {
            ESP_LOGW("remeha", "SDO abort on 0x4004: %02X%02X%02X%02X", x[7], x[6], x[5], x[4]);
          }
        }

  # --- Custom SDO response (0x1C1): authentication state machine + data parsing ---
  - can_id: 0x1C1
    then:
    - lambda: |-
        if (x.size() < 4) return;

        // --- Segmented SDO read handler (for 0x501D water pressure) ---
        if (id(seg_read_active)) {
          uint8_t seg_cmd = x[0];
          // Segment upload response: bits 7-5 = 000
          if ((seg_cmd & 0xE0) == 0x00) {
            int seg = id(seg_read_segment);
            bool is_last = (seg_cmd & 0x01) != 0;
            // Segment 3 = bytes 21-27; byte 22 = x[2]
            if (seg == 3 && x.size() >= 3) {
              uint8_t raw = x[2];
              float wp = raw * 0.01f;
              id(${device_name}_water_pressure).publish_state(wp);
              ESP_LOGI("remeha", "Water pressure=%.1f bar (raw=%d)", wp, raw);
            }
            if (is_last) {
              id(seg_read_active) = false;
              id(seg_read_segment) = 0;
              ESP_LOGD("remeha", "Segmented read complete");
            } else {
              id(seg_read_segment) = seg + 1;
              uint8_t toggle = ((seg + 1) & 1) ? 0x70 : 0x60;
              uint8_t req[8] = {toggle, 0, 0, 0, 0, 0, 0, 0};
              id(can1).send_data(0x241, false, false, std::vector<uint8_t>(req, req + 8));
            }
            return;
          }
          // Abort during segmented read
          if (x[0] == 0x80) {
            ESP_LOGW("remeha", "Segmented read aborted by boiler");
            id(seg_read_active) = false;
            id(seg_read_segment) = 0;
          }
        }

        uint8_t cmd = x[0];
        uint16_t index = ((uint16_t)x[2] << 8) | x[1];
        uint8_t sub = x[3];

        // ============================================================
        // TEA (Tiny Encryption Algorithm) authentication
        // Key = [0x15EFA43F, serialNumber, token, userLevel]
        // Plaintext = [userLevel, userLevel]
        // ============================================================
        auto tea_encrypt = [](uint32_t v[2], const uint32_t k[4]) {
          uint32_t v0 = v[0], v1 = v[1];
          uint32_t sum = 0;
          const uint32_t delta = 0x9E3779B9u;
          for (int i = 0; i < 32; i++) {
            sum += delta;
            v0 += ((v1 << 4) + k[0]) ^ (v1 + sum) ^ ((v1 >> 5) + k[1]);
            v1 += ((v0 << 4) + k[2]) ^ (v0 + sum) ^ ((v0 >> 5) + k[3]);
          }
          v[0] = v0;
          v[1] = v1;
        };

        // ---------- ABORT handling ----------
        if (cmd == 0x80) {
          uint32_t abort_code = ((uint32_t)x[7] << 24) | ((uint32_t)x[6] << 16) |
                                ((uint32_t)x[5] << 8) | x[4];

          // If a parameter write was pending, report write failure
          if (id(sdo_write_pending)) {
            const char* reason = "unknown error";
            if (abort_code == 0x06010000) reason = "access denied";
            else if (abort_code == 0x06010002) reason = "write-only object";
            else if (abort_code == 0x06020000) reason = "object does not exist";
            else if (abort_code == 0x06040043) reason = "parameter incompatibility";
            else if (abort_code == 0x06090030) reason = "value out of range";
            else if (abort_code == 0x06090031) reason = "value too high";
            else if (abort_code == 0x06090032) reason = "value too low";
            ESP_LOGW("remeha", "WRITE FAILED 0x%04X sub %d: %s (0x%08X)",
                     index, sub, reason, abort_code);
            id(sdo_write_pending) = false;
            char status[64];
            snprintf(status, sizeof(status), "FAILED: %s", reason);
            id(${device_name}_write_status).publish_state(status);
            return;
          }

          // Auth/read related aborts
          if (abort_code == 0x06010000) {
            ESP_LOGW("remeha", "Access denied for 0x%04X sub %d, re-auth needed", index, sub);
            if (id(auth_step) == 0) {
              id(sdo_authenticated) = false;
            }
          } else if (abort_code == 0x06040043) {
            ESP_LOGW("remeha", "Auth rejected (param incompatibility), will retry");
            id(auth_step) = 0;
            id(sdo_authenticated) = false;
          } else {
            ESP_LOGD("remeha", "SDO ABORT 0x%04X sub %d code 0x%08X", index, sub, abort_code);
          }
          return;
        }

        // ---------- WRITE ACK handling (auth steps) ----------
        if (cmd == 0x60) {
          if (index == 0x4003 && sub == 0x03 && id(auth_step) == 3) {
            ESP_LOGI("remeha", "Auth step3: sub3 ack, writing sub1=0x%08X", id(auth_sub1));
            uint32_t s1 = id(auth_sub1);
            uint8_t data[8] = {0x23, 0x03, 0x40, 0x01,
              (uint8_t)(s1 & 0xFF), (uint8_t)((s1>>8)&0xFF),
              (uint8_t)((s1>>16)&0xFF), (uint8_t)((s1>>24)&0xFF)};
            id(can1).send_data(0x241, false, false, std::vector<uint8_t>(data, data + 8));
            id(auth_step) = 4;
          }
          else if (index == 0x4003 && sub == 0x01 && id(auth_step) == 4) {
            ESP_LOGI("remeha", "Auth step4: sub1 ack, writing sub2=0x%08X", id(auth_sub2));
            uint32_t s2 = id(auth_sub2);
            uint8_t data[8] = {0x23, 0x03, 0x40, 0x02,
              (uint8_t)(s2 & 0xFF), (uint8_t)((s2>>8)&0xFF),
              (uint8_t)((s2>>16)&0xFF), (uint8_t)((s2>>24)&0xFF)};
            id(can1).send_data(0x241, false, false, std::vector<uint8_t>(data, data + 8));
            id(auth_step) = 5;
          }
          else if (index == 0x4003 && sub == 0x02 && id(auth_step) == 5) {
            ESP_LOGI("remeha", "Auth step5: sub2 ack, reading access level (0x4002)");
            uint8_t data[8] = {0x40, 0x02, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00};
            id(can1).send_data(0x241, false, false, std::vector<uint8_t>(data, data + 8));
            id(auth_step) = 6;
          }
          else {
            // Parameter write ACK - read back to confirm
            if (id(sdo_write_pending)) {
              ESP_LOGI("remeha", "WRITE OK: 0x%04X sub %d", index, sub);
              id(sdo_write_pending) = false;
              id(${device_name}_write_status).publish_state("OK");
              // Read back the written parameter to confirm new value
              uint8_t rd[8] = {0x40, (uint8_t)(index & 0xFF), (uint8_t)(index >> 8), sub,
                               0x00, 0x00, 0x00, 0x00};
              id(can1).send_data(0x241, false, false, std::vector<uint8_t>(rd, rd + 8));
            } else {
              ESP_LOGD("remeha", "Write ACK 0x%04X sub %d", index, sub);
            }
          }
          return;
        }

        // ---------- READ RESPONSE handling ----------
        if ((cmd & 0xE0) == 0x40) {
          uint32_t value = 0;
          for (int i = 0; i < 4 && (4+i) < (int)x.size(); i++)
            value |= ((uint32_t)x[4+i]) << (8*i);

          // --- Auth state machine ---
          if (index == 0x2001 && sub == 0x0A && id(auth_step) == 1) {
            id(auth_serial) = value;
            ESP_LOGI("remeha", "Auth step1: serial=0x%08X, reading token...", value);
            uint8_t data[8] = {0x40, 0x01, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00};
            id(can1).send_data(0x241, false, false, std::vector<uint8_t>(data, data + 8));
            id(auth_step) = 2;
            return;
          }

          // Auth step 2: got token from 0x4001 sub 0 — TEA encrypt & start writing
          if (index == 0x4001 && sub == 0x00 && id(auth_step) == 2) {
            const uint32_t user_level = 2; // SERVICE (needed for parameter writes)
            uint32_t v[2] = {user_level, user_level};
            uint32_t k[4] = {0x15EFA43Fu, id(auth_serial), value, user_level};
            tea_encrypt(v, k);
            id(auth_sub1) = v[0];
            id(auth_sub2) = v[1];
            ESP_LOGI("remeha", "Auth step2: token=0x%08X => sub1=0x%08X sub2=0x%08X",
                     value, v[0], v[1]);
            uint8_t wd[8] = {0x2F, 0x03, 0x40, 0x03, (uint8_t)user_level, 0x00, 0x00, 0x00};
            id(can1).send_data(0x241, false, false, std::vector<uint8_t>(wd, wd + 8));
            id(auth_step) = 3;
            return;
          }

          if (index == 0x4002 && sub == 0x00 && id(auth_step) == 6) {
            // Step 6: got access level — check if auth succeeded
            if (value >= 1) {
              ESP_LOGI("remeha", "*** AUTHENTICATED *** (access level = %u)", value);
              id(sdo_authenticated) = true;
              id(auth_step) = 0;
              id(sdo_read_step) = 0;
            } else {
              ESP_LOGW("remeha", "Auth FAILED: access level = %u", value);
              id(sdo_authenticated) = false;
              id(auth_step) = 0;
            }
            return;
          }

          // --- Data parsing for SDO reads ---
          if (index == 0x500F && sub == 0x00) {
            id(${device_name}_locking_mode).publish_state(value);
          }
          else if (index == 0x5011 && sub == 0x00) {
            id(${device_name}_blocking_mode).publish_state(value);
          }
          else if (index == 0x1003 && sub == 0x01) {
            id(${device_name}_error_history).publish_state(value);
          }
          else if (index == 0x2004 && sub == 0x01) {
            id(${device_name}_diagnostics).publish_state(value);
          }
          else if (index == 0x502C && sub == 0x00) {
            id(${device_name}_appliance_type).publish_state(value);
          }
          else if (index == 0x5037 && sub == 0x00) {
            id(${device_name}_appliance_variant).publish_state(value);
          }
          // --- Writable parameter read-back ---
          // CP510: Temporary room setpoint (uint16, scale x0.1)
          else if (index == 0x3451 && sub == 0x01) {
            float temp = (value & 0xFFFF) * 0.1f;
            id(${device_name}_cp510_setpoint).publish_state(temp);
            ESP_LOGD("remeha", "CP510 current=%.1f C (raw=%u)", temp, value & 0xFFFF);
          }
          // DHW comfort setpoint (uint8)
          else if (index == 0x3654 && sub == 0x01) {
            id(${device_name}_dhw_comfort_setpoint).publish_state(value & 0xFF);
            ESP_LOGD("remeha", "DHW comfort=%d C", value & 0xFF);
          }
          // DHW reduced setpoint (uint8)
          else if (index == 0x3655 && sub == 0x01) {
            id(${device_name}_dhw_reduced_setpoint).publish_state(value & 0xFF);
            ESP_LOGD("remeha", "DHW reduced=%d C", value & 0xFF);
          }
          // Flow setpoint (uint8)
          else if (index == 0x3402 && sub == 0x01) {
            id(${device_name}_flow_setpoint_param).publish_state(value & 0xFF);
            ESP_LOGD("remeha", "Flow setpoint=%d C", value & 0xFF);
          }
          // Room activity setpoint 1 (uint16, scale x0.1)
          else if (index == 0x340C && sub == 0x01) {
            float temp = (value & 0xFFFF) * 0.1f;
            id(${device_name}_room_setpoint1).publish_state(temp);
            ESP_LOGD("remeha", "Room setpoint 1=%.1f C (raw=%u)", temp, value & 0xFFFF);
          }
          // Zone mode (uint8: 0=Off, 1=Heat, 2=Auto)
          else if (index == 0x341F && sub == 0x01) {
            uint8_t mode = value & 0xFF;
            if (mode == 0) id(${device_name}_zone_mode).publish_state("Off");
            else if (mode == 1) id(${device_name}_zone_mode).publish_state("Heat");
            else if (mode == 2) id(${device_name}_zone_mode).publish_state("Auto");
            else ESP_LOGW("remeha", "Unknown zone mode: %d", mode);
          }
          // DHW mode (uint8: 0=Off, 1=On, 2=Auto)
          else if (index == 0x3661 && sub == 0x01) {
            uint8_t mode = value & 0xFF;
            if (mode == 0) id(${device_name}_dhw_mode).publish_state("Off");
            else if (mode == 1) id(${device_name}_dhw_mode).publish_state("On");
            else if (mode == 2) id(${device_name}_dhw_mode).publish_state("Auto");
            else ESP_LOGW("remeha", "Unknown DHW mode: %d", mode);
          }
          // Water pressure trending string (0x501D) — segmented transfer
          else if (index == 0x501D && sub == 0x00) {
            bool expedited = (cmd & 0x02) != 0;
            if (!expedited) {
              // Initiate segmented read: request first segment (toggle=0)
              id(seg_read_active) = true;
              id(seg_read_segment) = 0;
              id(seg_read_start_ms) = millis();
              uint8_t req[8] = {0x60, 0, 0, 0, 0, 0, 0, 0};
              id(can1).send_data(0x241, false, false, std::vector<uint8_t>(req, req + 8));
              ESP_LOGD("remeha", "Segmented read of 0x501D started");
              return;
            }
          }
          else {
            ESP_LOGD("remeha", "SDO READ 0x%04X sub %d = 0x%08X (%u)", index, sub, value, value);
          }
        }

  # --- PDO handlers (no auth needed) ---
  - can_id: 0x282
    then:
    - lambda: |-
        if(x.size() < 4) return;
        id(${device_name}_am024_rel_power).publish_state(x[0]);
        float flow_temp = (((uint16_t)x[2] << 8) + x[3]) / 100.00;
        id(${device_name}_flow_temperature).publish_state(flow_temp);
        if (x.size() > 5) {
          float ret_temp = (((uint16_t)x[4] << 8) + x[5]) / 100.00;
          id(${device_name}_return_temperature).publish_state(ret_temp);
        }

  - can_id: 0x381
    then:
    - lambda: |-
        if(x.size() < 6) return;
        float out_temp = int16_t(((uint16_t)x[1] << 8) + x[0]) / 100.00;
        id(${device_name}_am027_outside_temp).publish_state(out_temp);
        float out_temp_3m = int16_t(((uint16_t)x[3] << 8) + x[2]) / 100.00;
        id(${device_name}_outside_temp_3m_avg).publish_state(out_temp_3m);
        float out_temp_2h = int16_t(((uint16_t)x[5] << 8) + x[4]) / 100.00;
        id(${device_name}_outside_temp_2h_avg).publish_state(out_temp_2h);

  - can_id: 0x382
    then:
    - lambda: |-
        if(x.size() < 4) return;
        float setpoint = (((uint16_t)x[2] << 8) + x[3]) / 100.00;
        id(${device_name}_setpoint).publish_state(setpoint);

  - can_id: 0x481
    then:
    - lambda: |-
        if(x.size() < 2) return;
        uint8_t status = x[0];
        uint8_t substatus = x[1];
        id(${device_name}_am012_status).publish_state(status);
        id(${device_name}_am014_substatus).publish_state(substatus);

        const char* status_text;
        switch(status) {
          case 0:  status_text = "Standby"; break;
          case 1:  status_text = "Heat request"; break;
          case 2:  status_text = "Burner ignition"; break;
          case 3:  status_text = "Heating mode"; break;
          case 4:  status_text = "DHW mode"; break;
          case 5:  status_text = "Burner off"; break;
          case 6:  status_text = "Pump active"; break;
          case 8:  status_text = "Burner shut down"; break;
          case 9:  status_text = "Temporary fault"; break;
          case 10: status_text = "Permanent fault"; break;
          case 11: status_text = "Test heat min"; break;
          case 12: status_text = "Test heat max"; break;
          case 13: status_text = "Test DWH max"; break;
          case 15: status_text = "Manual heat"; break;
          case 16: status_text = "Frost protection"; break;
          case 17: status_text = "Bleed air"; break;
          case 19: status_text = "Reset"; break;
          case 20: status_text = "Automatic filling"; break;
          case 22: status_text = "Forced calibration"; break;
          case 200: status_text = "Service mode"; break;
          default: status_text = "Unknown";
        }
        id(${device_name}_am012_statustext).publish_state(status_text);

        const char* sub_text;
        switch(substatus) {
          case 0:  sub_text = "Standby"; break;
          case 1:  sub_text = "Waiting ignition"; break;
          case 4:  sub_text = "Waiting for temperature"; break;
          case 13: sub_text = "Pre-ventilation"; break;
          case 15: sub_text = "Ignition signal sent"; break;
          case 17: sub_text = "Burner pre-ignition"; break;
          case 18: sub_text = "Burner ignition"; break;
          case 19: sub_text = "Flame check"; break;
          case 20: sub_text = "Fan operation at ign"; break;
          case 30: sub_text = "Operation at setpoint"; break;
          case 31: sub_text = "Operation reduced setpoint"; break;
          case 32: sub_text = "Operation required setpoint"; break;
          case 33: sub_text = "Level1 ramp"; break;
          case 34: sub_text = "Level2 ramp"; break;
          case 35: sub_text = "Level3 ramp"; break;
          case 36: sub_text = "Flame protection"; break;
          case 37: sub_text = "Stabilization time"; break;
          case 38: sub_text = "Start min output"; break;
          case 39: sub_text = "Heating mode interupted by DWH"; break;
          case 41: sub_text = "Post-ventilation"; break;
          case 44: sub_text = "Fan off"; break;
          case 45: sub_text = "Power reduction"; break;
          case 46: sub_text = "Automatic filling: empty"; break;
          case 47: sub_text = "Automatic filling: low"; break;
          case 60: sub_text = "Pump post-ventilation"; break;
          case 95: sub_text = "Standby due water pressure"; break;
          default: sub_text = "Unknown";
        }
        id(${device_name}_am014_substatustext).publish_state(sub_text);

  - can_id: 0x482
    then:
    - lambda: |-
        if(x.size() < 4) return;
        if(x[0] == 0x01 && x[1] == 0x03) {
          id(${device_name}_rel_power2).publish_state(float(x[3]));
        }

# GVRET component to use with SavvyCAN for remote CANbus message analysis
canbus_gvret:
  can:
  - canbus_id: can1
