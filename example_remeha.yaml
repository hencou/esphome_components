substitutions:
  device_name: remeha
  friendly_name: Remeha Tzerra Ace Matic

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  on_boot:
    then:
    - delay: 10s

    # NMT reset node
    - canbus.send:
        canbus_id: can1
        can_id: 0x000
        data: [0x81, 0x00]

    - delay: 500ms

    # NMT start node
    - canbus.send:
        canbus_id: can1
        can_id: 0x000
        data: [0x01, 0x00]

    - delay: 500ms

    # Read 0x4004 sub 0 via standard SDO to enable custom SDO gateway (0x241/0x1C1)
    - canbus.send:
        canbus_id: can1
        can_id: 0x601
        data: [0x40, 0x04, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00]

    # Fallback: if read does not return ready within 2s, try write approach
    - delay: 2s
    - lambda: |-
        if (!id(sdo_node1_enabled)) {
          ESP_LOGW("remeha", "0x4004 read did not return ready, trying write...");
          uint8_t data[8] = {0x2F, 0x04, 0x40, 0x00, 0x01, 0x00, 0x00, 0x00};
          id(can1).send_data(0x601, false, false, std::vector<uint8_t>(data, data + 8));
        }

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
- source: github://hencou/esphome_gvret
  components: [canbus_gvret]
  refresh: 0s

logger:
  level: INFO

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssidC
  password: !secret wifi_passwordC
  min_auth_mode: WPA2
  enable_btm: True
  enable_rrm: True

globals:
  - id: sdo_node1_enabled
    type: bool
    initial_value: 'false'
  - id: sdo_authenticated
    type: bool
    initial_value: 'false'
  - id: auth_step
    type: int
    initial_value: '0'
  - id: auth_serial
    type: uint32_t
    initial_value: '0'
  - id: auth_sub1
    type: uint32_t
    initial_value: '0'
  - id: auth_sub2
    type: uint32_t
    initial_value: '0'
  - id: sdo_read_step
    type: int
    initial_value: '0'
  - id: auth_start_ms
    type: uint32_t
    initial_value: '0'
  # --- SDO write state ---
  - id: sdo_write_pending
    type: bool
    initial_value: 'false'
  - id: sdo_write_start_ms
    type: uint32_t
    initial_value: '0'
  # --- Segmented SDO read state (for water pressure via 0x501D) ---
  - id: seg_read_active
    type: bool
    initial_value: 'false'
  - id: seg_read_segment
    type: int
    initial_value: '0'
  - id: seg_read_start_ms
    type: uint32_t
    initial_value: '0'

time:
  - platform: homeassistant
    on_time:
      # Heartbeat every second
      - seconds: /1
        then:
          - canbus.send:
              canbus_id: can1
              can_id: 0x281
              data: [0x03, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]

      # Every 10 seconds: gateway check + auth retry + SDO reads
      - seconds: /10
        then:
          - lambda: |-
              // Auth timeout: if stuck for >10s, reset
              if (id(auth_step) > 0 && (millis() - id(auth_start_ms)) > 10000) {
                ESP_LOGW("remeha", "Auth timeout at step %d, resetting", id(auth_step));
                id(auth_step) = 0;
                id(sdo_authenticated) = false;
              }

              // Write timeout: if pending for >5s, clear
              if (id(sdo_write_pending) && (millis() - id(sdo_write_start_ms)) > 5000) {
                ESP_LOGW("remeha", "SDO write timeout");
                id(sdo_write_pending) = false;
                id(${device_name}_write_status).publish_state("Timeout");
              }

              // Segmented read timeout: if stuck for >5s, cancel
              if (id(seg_read_active) && (millis() - id(seg_read_start_ms)) > 5000) {
                ESP_LOGW("remeha", "Segmented read timeout at segment %d", id(seg_read_segment));
                id(seg_read_active) = false;
                id(seg_read_segment) = 0;
              }

              // Don't send reads while a write or segmented read is pending
              if (id(sdo_write_pending) || id(seg_read_active)) return;

              // Re-check gateway if not yet enabled
              if (!id(sdo_node1_enabled)) {
                uint8_t gw[8] = {0x40, 0x04, 0x40, 0x00, 0x00, 0x00, 0x00, 0x00};
                id(can1).send_data(0x601, false, false, std::vector<uint8_t>(gw, gw + 8));
                return;
              }

              // If not authenticated, start auth (SERVICE level for parameter writes)
              if (!id(sdo_authenticated) && id(auth_step) == 0) {
                ESP_LOGI("remeha", "Attempting authentication (SERVICE)...");
                uint8_t rd[8] = {0x40, 0x01, 0x20, 0x0A, 0x00, 0x00, 0x00, 0x00};
                id(can1).send_data(0x241, false, false, std::vector<uint8_t>(rd, rd + 8));
                id(auth_step) = 1;
                id(auth_start_ms) = millis();
                return;
              }

              // SDO reads (one object per cycle, round-robin)
              if (!id(sdo_authenticated) || id(auth_step) != 0) return;
              static const uint16_t sdo_objects[][2] = {
                {0x500F, 0x00},  // Locking mode
                {0x5011, 0x00},  // Blocking mode
                {0x1003, 0x01},  // Error history
                {0x2004, 0x01},  // Diagnostics
                {0x502C, 0x00},  // Appliance type
                {0x5037, 0x00},  // Appliance variant
                {0x3451, 0x01},  // CP510 Temporary room setpoint
                {0x3654, 0x01},  // DHW comfort setpoint
                {0x3655, 0x01},  // DHW reduced setpoint
                {0x3402, 0x01},  // Flow setpoint
                {0x340C, 0x01},  // Room activity setpoint 1
                {0x341F, 0x01},  // Zone mode
                {0x3661, 0x01},  // DHW mode
                {0x501D, 0x00},  // Water pressure (trending string, segmented)
              };
              static const int NUM_SDO = sizeof(sdo_objects) / sizeof(sdo_objects[0]);
              int step = id(sdo_read_step) % NUM_SDO;
              uint16_t idx = sdo_objects[step][0];
              uint8_t sub = sdo_objects[step][1];
              uint8_t data[8] = {0x40, (uint8_t)(idx & 0xFF), (uint8_t)(idx >> 8), sub,
                                 0x00, 0x00, 0x00, 0x00};
              id(can1).send_data(0x241, false, false, std::vector<uint8_t>(data, data + 8));
              id(sdo_read_step) = (step + 1) % NUM_SDO;

