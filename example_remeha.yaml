          return;
        }
        // DHW comfort: index=0x3654, sub=1, uint8
        uint8_t raw = (uint8_t)x;
        uint8_t data[8] = {0x2F, 0x54, 0x36, 0x01,
          raw, 0x00, 0x00, 0x00};
