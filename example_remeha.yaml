# ============================================================
# Writable parameters (number inputs)
# Set value in Home Assistant, it writes to boiler via SDO
# Current boiler values are read back via round-robin polling
# ============================================================
number:
- platform: template
  name: "CP510 Temporary Room Setpoint"
  id: ${device_name}_cp510_setpoint
  min_value: 5.0
  max_value: 30.0
  step: 0.5
  unit_of_measurement: "°C"
  icon: "mdi:home-thermometer"
  optimistic: false
  set_action:
    - lambda: |-
        if (!id(sdo_authenticated)) {
          ESP_LOGW("remeha", "Cannot write: not authenticated");
          id(${device_name}_write_status).publish_state("Not authenticated");
          return;
        }
        if (id(sdo_write_pending)) {
          ESP_LOGW("remeha", "Write busy, try again later");
          id(${device_name}_write_status).publish_state("Busy");
          return;
        }
        // CP510: index=0x3451, sub=1, uint16, scale x0.1
        uint16_t raw = (uint16_t)(x * 10);
        uint8_t data[8] = {0x2B, 0x51, 0x34, 0x01,
          (uint8_t)(raw & 0xFF), (uint8_t)(raw >> 8), 0x00, 0x00};
        id(can1).send_data(0x241, false, false, std::vector<uint8_t>(data, data + 8));
        id(sdo_write_pending) = true;
        id(sdo_write_start_ms) = millis();
        id(${device_name}_write_status).publish_state("Sending...");
        ESP_LOGI("remeha", "WRITE CP510=%.1f C (raw=%u) to 0x3451/1", x, raw);

- platform: template
  name: "DHW Comfort Setpoint"
  id: ${device_name}_dhw_comfort_setpoint
  min_value: 40
  max_value: 65
  step: 1
  unit_of_measurement: "°C"
