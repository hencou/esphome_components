substitutions:
  device_name: remeha
  friendly_name: Remeha Tzerra Ace Matic

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
- source: github://hencou/esphome_components
  components: [remeha]
  refresh: 0s
- source: github://hencou/esphome_gvret
  components: [canbus_gvret]
  refresh: 0s

logger:
  level: INFO

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

canbus:
- platform: esp32_can
  id: can1
  tx_pin: GPIO5
  rx_pin: GPIO35
  can_id: 0x100
  bit_rate: 1000kbps
  mode: NORMAL

# --- Remeha component ---
remeha:
  canbus_id: can1
  boot_delay: 10s
  user_level: 2  # 1=GUEST, 2=SERVICE (needed for parameter writes)

# --- Sensors ---
sensor:
- platform: remeha
  flow_temperature:
    name: Flow Temperature
  return_temperature:
    name: Return Temperature
  outside_temperature:
    name: Outside Temperature
  outside_temperature_3m_avg:
    name: Outside Temperature 3min avg
  outside_temperature_2h_avg:
    name: Outside Temperature 2h avg
  setpoint:
    name: Setpoint
  relative_power:
    name: Relative Power
  relative_power2:
    name: Relative Power 2
  status_code:
    name: Status Code
  substatus_code:
    name: Substatus Code
  water_pressure:
    name: Water Pressure
  locking_mode:
    name: Locking Mode
  blocking_mode:
    name: Blocking Mode
  error_history:
    name: Error History
  diagnostics:
    name: Diagnostics
  appliance_type:
    name: Appliance Type
  appliance_variant:
    name: Appliance Variant

- platform: uptime
  name: Uptime
  filters:
    - throttle: 300s
- platform: wifi_signal
  name: WiFi signal
  filters:
    - delta: 0.01
    - throttle: 300s

# --- Writable parameters ---
number:
- platform: remeha
  cp510_setpoint:
    name: "CP510 Temporary Room Setpoint"
  dhw_comfort_setpoint:
    name: "DHW Comfort Setpoint"
  dhw_reduced_setpoint:
    name: "DHW Reduced Setpoint"
  flow_setpoint:
    name: "Flow Setpoint"
  room_setpoint1:
    name: "Room Activity Setpoint 1"

# --- Mode selectors ---
select:
- platform: remeha
  zone_mode:
    name: "Zone Mode"
  dhw_mode:
    name: "DHW Mode"

# --- Status text ---
text_sensor:
- platform: remeha
  status_text:
    name: Status Text
  substatus_text:
    name: Substatus Text
  write_status:
    name: SDO Write Status

- platform: version
  name: ESPHome Version
- platform: wifi_info
  ip_address:
    name: IP Address
  ssid:
    name: SSID

button:
- platform: restart
  name: Restart
- platform: safe_mode
  name: Safe Mode

# GVRET component to use with SavvyCAN for remote CANbus message analysis
canbus_gvret:
  can:
  - canbus_id: can1
