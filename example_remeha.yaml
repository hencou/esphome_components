select:
- platform: template
  name: "Zone Mode"
  id: ${device_name}_zone_mode
  icon: "mdi:home-switch"
  options:
    - "Off"
    - "Heat"
    - "Auto"
  optimistic: false
  set_action:
    - lambda: |-
        if (!id(sdo_authenticated)) {
          ESP_LOGW("remeha", "Cannot write: not authenticated");
          id(${device_name}_write_status).publish_state("Not authenticated");
          return;
        }
        if (id(sdo_write_pending)) {
          ESP_LOGW("remeha", "Write busy, try again later");
          id(${device_name}_write_status).publish_state("Busy");
          return;
        }
        // Zone mode: index=0x341F, sub=1, uint8 (0=Off, 1=Heat, 2=Auto)
        uint8_t val = 0;
        if (x == "Heat") val = 1;
        else if (x == "Auto") val = 2;
        uint8_t data[8] = {0x2F, 0x1F, 0x34, 0x01,
          val, 0x00, 0x00, 0x00};
        id(can1).send_data(0x241, false, false, std::vector<uint8_t>(data, data + 8));
        id(sdo_write_pending) = true;
        id(sdo_write_start_ms) = millis();
        id(${device_name}_write_status).publish_state("Sending...");
        ESP_LOGI("remeha", "WRITE Zone mode=%s (%d) to 0x341F/1", x.c_str(), val);

- platform: template
  name: "DHW Mode"
  id: ${device_name}_dhw_mode
  icon: "mdi:water-boiler"
  options:
    - "Off"
    - "On"
    - "Auto"
  optimistic: false
  set_action:
    - lambda: |-
        if (!id(sdo_authenticated)) {
          ESP_LOGW("remeha", "Cannot write: not authenticated");
          id(${device_name}_write_status).publish_state("Not authenticated");
          return;
        }
        if (id(sdo_write_pending)) {
          ESP_LOGW("remeha", "Write busy, try again later");
          id(${device_name}_write_status).publish_state("Busy");
          return;
        }
        // DHW mode: index=0x3661, sub=1, uint8 (0=Off, 1=On, 2=Auto)
        uint8_t val = 0;
        if (x == "On") val = 1;
        else if (x == "Auto") val = 2;
        uint8_t data[8] = {0x2F, 0x61, 0x36, 0x01,
          val, 0x00, 0x00, 0x00};
        id(can1).send_data(0x241, false, false, std::vector<uint8_t>(data, data + 8));
        id(sdo_write_pending) = true;
        id(sdo_write_start_ms) = millis();
        id(${device_name}_write_status).publish_state("Sending...");
        ESP_LOGI("remeha", "WRITE DHW mode=%s (%d) to 0x3661/1", x.c_str(), val);

