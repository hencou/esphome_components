substitutions:
  device_name: remeha
  friendly_name: Remeha Tzerra Ace Matic

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: esp-idf

external_components:
- source:
    type: local
    path: my_components
  components: [remeha]
  refresh: 0s
- source: github://hencou/esphome_gvret
  components: [canbus_gvret]
  refresh: 0s

logger:
  level: WARN

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssidC
  password: !secret wifi_passwordC

canbus:
- platform: esp32_can
  id: can1
  tx_pin: GPIO5
  rx_pin: GPIO35
  can_id: 0x100
  bit_rate: 1000kbps
  mode: NORMAL

# --- Remeha component ---
remeha:
  canbus_id: can1
  boot_delay: 10s
  user_level: 2  # 1=GUEST, 2=SERVICE (needed for parameter writes)

# --- Sensors ---
sensor:
- platform: remeha
  flow_temperature:
    name: Flow Temperatuur
    entity_category: DIAGNOSTIC
    filters:
      - delta: 0.1
  outside_temperature:
    name: Buiten temperatuur
    entity_category: DIAGNOSTIC
    filters:
      - delta: 0.1
  outside_temperature_3m_avg:
    name: Buiten temperatuur 3min avg
    entity_category: DIAGNOSTIC
    filters:
      - delta: 0.1
  outside_temperature_2h_avg:
    name: Buiten temperatuur 2h avg
    entity_category: DIAGNOSTIC
    filters:
      - delta: 0.1
  setpoint:
    name: Setpoint
    entity_category: DIAGNOSTIC
    filters:
      - delta: 0.1
  relative_power:
    name: Relative Power
    entity_category: DIAGNOSTIC
    filters:
      - delta: 0.1
  relative_power2:
    name: Relative Power 2
    entity_category: DIAGNOSTIC
    filters:
      - delta: 0.1
  status_code:
    name: Status Code
    entity_category: DIAGNOSTIC
  substatus_code:
    name: Substatus Code
    entity_category: DIAGNOSTIC
  water_pressure:
    name: Waterdruk
  room_temperature:
    name: Truimte groep
  locking_mode:
    name: Locking Mode
    entity_category: DIAGNOSTIC
  blocking_mode:
    name: Blocking Mode
    entity_category: DIAGNOSTIC
  appliance_type:
    name: Appliance Type
    entity_category: DIAGNOSTIC
  appliance_variant:
    name: Appliance Variant
    entity_category: DIAGNOSTIC
  return_temperature:
    name: T retour
  #dhw_temperature:
  #  name: SWW tank temp
  control_temperature:
    name: Regeltemperatuur
    entity_category: DIAGNOSTIC
  internal_setpoint:
    name: Intern setpunt
    entity_category: DIAGNOSTIC
  outside_temp_boiler:
    name: Tbuiten ketel
  calculated_temperature:
    name: Berekende temperatuur
    entity_category: DIAGNOSTIC
  boiler_temperature:
    name: T aanvoer (trending)
  flue_gas_temperature:
    name: Rookgastemperatuur
    entity_category: DIAGNOSTIC
  actual_modulation:
    name: Act. rel. modulatie
    entity_category: DIAGNOSTIC
  pump_speed:
    name: Pomptoerental
    entity_category: DIAGNOSTIC
  flame_current:
    name: Vlamstroom
    entity_category: DIAGNOSTIC

- platform: uptime
  name: Uptime
  filters:
    - throttle: 300s
- platform: wifi_signal
  name: WiFi signal
  filters:
    - delta: 0.01
    - throttle: 300s

# --- Writable parameters ---
number:
- platform: remeha
  room_setpoint:
    name: "Truimte stpunt"
  dhw_comfort_setpoint:
    name: "Warm Water Comfort Setpoint"
    entity_category: CONFIG
  dhw_reduced_setpoint:
    name: "Warm Water Reduced Setpoint"
    entity_category: CONFIG
  night_setpoint:
    name: "Nacht Setpoint"
    entity_category: CONFIG
  holiday_setpoint:
    name: "Vakantie Setpoint"
    entity_category: CONFIG
  summer_winter_threshold:
    name: "Zomer/Winter Drempel"
    entity_category: CONFIG
  heating_curve_slope:
    name: "Stooklijn Helling"
    entity_category: CONFIG
  room_sensor_calibration:
    name: "Kamersensor Kalibratie"
    entity_category: CONFIG
  anti_legionella_setpoint:
    name: "Anti-Legionella Setpoint"
    entity_category: CONFIG

# --- Mode selectors ---
select:
- platform: remeha
  zone_mode:
    name: "Zone Mode"
    options:
      - "Auto"
      - "Verwarmen"
      - "Uit"
  time_program:
    name: "Klokprogramma"
    options:
      - "Klokprogramma 1"
      - "Klokprogramma 2"
      - "Klokprogramma 3"
  ch_enabled:
    name: "CV Bedrijf"
    options:
      - "Uit"
      - "Aan"
  dhw_enabled:
    name: "Warm Water"
    options:
      - "Uit"
      - "Aan"
  anti_legionella_mode:
    name: "Anti-Legionella"
    options:
      - "Uit"
      - "Aan"
      - "Auto"
    entity_category: CONFIG
  fireplace_mode:
    name: "Open Haard"
    options:
      - "Uit"
      - "Aan"

# --- Status text ---
text_sensor:
- platform: remeha
  status_text:
    name: Status Text
    entity_category: DIAGNOSTIC
  substatus_text:
    name: Substatus Text
    entity_category: DIAGNOSTIC
  write_status:
    name: SDO Write Status
    entity_category: DIAGNOSTIC

- platform: version
  name: ESPHome Version
- platform: wifi_info
  ip_address:
    name: IP Address
  ssid:
    name: SSID

# --- Climate (thermostat in Home Assistant) ---
climate:
- platform: remeha
  name: "Thermostaat"
  time_program_names:
    - "Klokprogramma 1"
    - "Klokprogramma 2"
    - "Klokprogramma 3"

button:
- platform: restart
  name: Restart
- platform: safe_mode
  name: Safe Mode

# GVRET component to use with SavvyCAN for remote CANbus message analysis
canbus_gvret:
  can:
  - canbus_id: can1
